<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Green Design Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1c18;
      --muted: #6b6e66;
      --faint: #c8cac2;
      --bg: #f5f4ef;
      --card-bg: #ffffff;
      --accent-green: #2d5a3d;
      --accent-blue: #1a3a52;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background-color: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 8vw, 5rem);
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: #2a5c3a;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--faint);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .projects-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 1.25rem;
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      display: block;
      text-decoration: none;
      background: var(--card-bg);
      border: 1px solid var(--faint);
      border-radius: 4px;
      padding: 1.5rem;
      transition: border-color 0.2s ease, transform 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.6s; }
    .card:nth-child(2) { animation-delay: 0.72s; }

    .card:hover {
      border-color: var(--muted);
      transform: translateY(-2px);
    }

    .card-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-bottom: 1.25rem;
    }

    .indicator-green { background: var(--accent-green); }
    .indicator-blue  { background: var(--accent-blue); }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 18px;
      color: var(--ink);
      margin-bottom: 3px;
      line-height: 1.2;
    }

    .card-url {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--faint);
      text-transform: lowercase;
      margin-bottom: 0.9rem;
      font-weight: 400;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 300;
    }

    footer {
      padding: 2rem;
      text-align: center;
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.06em;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
      main { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>

  <main>
    <p class="wordmark">Access Green Design Group</p>

    <hr class="divider">
    <p class="projects-label">Projects</p>

    <div class="card-grid">
      <a class="card" href="https://effortlesslivinghomes.com" target="_blank" rel="noopener">
        <div class="card-indicator indicator-green"></div>
        <p class="card-name">Effortless Living Homes</p>
        <p class="card-url">effortlesslivinghomes.com</p>
        <p class="card-desc">Accessible, sustainable residential design for everyday living.</p>
      </a>
      <a class="card" href="https://studiolmr.com" target="_blank" rel="noopener">
        <div class="card-indicator indicator-blue"></div>
        <p class="card-name">Studio LMR</p>
        <p class="card-url">studiolmr.com</p>
        <p class="card-desc">Glass mosaics, inspired by the natural world.</p>
      </a>
    </div>
  </main>

  <footer>
    More coming soon &mdash; consultancy, past projects, and more.
  </footer>

</body>
</html>
